layout: default
title: "카테고리"
---

<h1>카테고리</h1>
<ul class="post-list">
  {% for category in site.categories %}
  <li>
    {% assign category_name = category[0] | slugify %}
    <a href="{{ '/categories/' | append: category_name | relative_url }}"
      >{{ category[0] }}</a
    >
  </li>
  {% endfor %}
</ul>
