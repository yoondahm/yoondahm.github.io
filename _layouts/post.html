---
layout: default
---
<article>
  <h1>{{ page.title }}</h1>
  <time>{{ page.date | date: "%Y년 %m월 %d일" }}</time>
  <div class="categories not_draggable">
    {% for category in page.categories %}
      <a href="{{ "/categories/" | relative_url }}{{ category | slugify }}" class="category">{{ category }}</a>
    {% endfor %}
  </div>
  <div class="content">
    {{ content }}
  </div>
</article>
